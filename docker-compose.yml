services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: door_monitor
      POSTGRES_USER: door
      POSTGRES_PASSWORD: doorpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U door -d door_monitor']
      interval: 2s
      timeout: 5s
      retries: 15

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://door:doorpass@db:5432/door_monitor
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
